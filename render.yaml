services:
  - type: web
    name: critical-fail-backend
    runtime: image
    image:
      url: ghcr.io/kynesilverhide/critical-fail-backend:latest
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: critical-fail-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_DEFAULT_USERNAME
        value: admin
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true
      - key: DEMO_ENABLED
        value: "false"
      - key: GITHUB_TOKEN
        sync: false

  - type: web
    name: critical-fail-frontend
    runtime: image
    image:
      url: ghcr.io/kynesilverhide/critical-fail-frontend:latest
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          name: critical-fail-backend
          type: web
          property: host

databases:
  - name: critical-fail-db
    databaseName: criticalfail
    user: criticalfail
    plan: free
