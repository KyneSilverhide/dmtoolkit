services:
  - type: web
    name: critical-fail-backend
    runtime: image
    image:
      url: ghcr.io/kynesilverhide/critical-fail-backend:latest
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: critical-fail-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: "https://REMPLACER-PAR-URL-FRONTEND.onrender.com"
        description: "OBLIGATOIRE après déploiement : remplacer cette valeur par l'URL du service critical-fail-frontend visible dans le dashboard Render. Utilisé pour le CORS et les QR codes. Redémarrer le backend ensuite."
      - key: ADMIN_DEFAULT_USERNAME
        value: admin
        description: "Nom d'utilisateur du compte administrateur créé au premier démarrage."
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true
        description: "Mot de passe admin généré automatiquement. À noter depuis l'onglet Environment après déploiement."
      - key: DEMO_ENABLED
        value: "false"
        description: "Mettre à true pour activer un compte de démonstration (code session 0000, reset automatique chaque nuit)."
      - key: GITHUB_TOKEN
        value: ""
        description: "OPTIONNEL : token GitHub classic (aucun scope requis) pour activer le générateur IA de noms, accroches de quêtes et descriptions via GitHub Models (gpt-4o-mini). Sans ce token, le générateur retourne une erreur 503."

  - type: web
    name: critical-fail-frontend
    runtime: image
    image:
      url: ghcr.io/kynesilverhide/critical-fail-frontend:latest
    plan: free
    envVars:
      - key: BACKEND_URL
        value: "https://REMPLACER-PAR-URL-BACKEND.onrender.com"
        description: "OBLIGATOIRE : remplacer par l'URL publique du service critical-fail-backend visible dans le dashboard Render (ex: https://critical-fail-backend-xxxx.onrender.com). Le navigateur utilise cette URL pour se connecter au backend."

databases:
  - name: critical-fail-db
    databaseName: criticalfail
    user: criticalfail
    plan: free
