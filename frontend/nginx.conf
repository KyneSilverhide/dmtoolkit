server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    # index.html ne doit jamais être mis en cache : c'est lui qui référence
    # les assets avec leurs hash de version. S'il est en cache, le navigateur
    # ne verra pas les nouveaux fichiers après une mise à jour.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Les assets JS/CSS générés par Vite contiennent un hash de contenu dans
    # leur nom (ex : assets/index-Bx3kR2aT.js). On peut donc les cacher
    # indéfiniment : un nouveau build produira de nouveaux noms de fichiers.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://dmtoolkit-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
