<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pipe Puzzle</title>

<style>

body{
    margin:0;
    background:#d8cfb2;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    font-family:Arial,sans-serif;
}

#wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
}

#game{
    display:grid;

    grid-template-columns:repeat(7,72px);
    grid-template-rows:repeat(7,72px);

    gap:0;

    border:4px solid #222;
    background:#d1c6a4;

    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.cell{
    width:72px;
    height:72px;

    cursor:pointer;

    background:
        linear-gradient(rgba(0,0,0,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.12) 1px, transparent 1px);

    background-size:18px 18px;
}

canvas{
    width:100%;
    height:100%;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;

    background:#222;
    color:white;

    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#111;
}

#status{
    height:24px;
    font-weight:bold;
    color:#2d6f2d;
}

</style>
</head>
<body>

<div id="wrapper">

    <div id="game"></div>

    <button onclick="shuffleBoard()">
        Mélanger
    </button>

    <div id="status"></div>

</div>

<script>

const SIZE = 7;
const CELL = 72;

let gameWon = false;

const DIRS = ['N','E','S','W'];

const VECTORS = {
    N:[0,-1],
    E:[1,0],
    S:[0,1],
    W:[-1,0]
};

const OPPOSITE = {
    N:'S',
    S:'N',
    E:'W',
    W:'E'
};

// Définition des pièces
const PIECES = {

    o:['N'],                 // cul de sac
    I:['N','S'],             // ligne
    L:['N','E'],             // coude
    T:['N','E','W']          // T
};

// Plateau
const SOLUTION = [

['o','L','L','T','I','I','o'],
['o','T','T','L','L','o','L'],
['o','o','T','o','L','o','T'],
['T','I','T','T','o','L','L'],
['o','o','I','T','L','T','o'],
['o','T','T','T','T','T','o'],
['o','L','L','o','o','T','o']

];

const board = [];

const game =
    document.getElementById("game");

function rotateDirection(dir, amount){

    const idx =
        DIRS.indexOf(dir);

    return DIRS[
        (idx + amount) % 4
    ];
}

function rotateConnections(
    connections,
    amount
){

    return connections.map(c =>
        rotateDirection(c, amount)
    );
}

function createBoard(){

    game.innerHTML = '';

    for(let y=0;y<SIZE;y++){

        board[y] = [];

        for(let x=0;x<SIZE;x++){

            const type =
                SOLUTION[y][x];

            const rotation =
                Math.floor(Math.random()*4);

            const cell = {

                x,
                y,

                type,

                rotation,

                powered:false,
                error:false,

                connections:
                    rotateConnections(
                        PIECES[type],
                        rotation
                    )
            };

            board[y][x] = cell;

            const div =
                document.createElement('div');

            div.className = 'cell';

            const canvas =
                document.createElement('canvas');

            canvas.width = CELL;
            canvas.height = CELL;

            div.appendChild(canvas);

            div.addEventListener(
                'click',
                ()=> rotateCell(x,y)
            );

            game.appendChild(div);
        }
    }

    recomputePower();

    redraw();
}

function rotateCell(x,y){

    const cell = board[y][x];

    cell.rotation =
        (cell.rotation + 1) % 4;

    cell.connections =
        rotateConnections(
            PIECES[cell.type],
            cell.rotation
        );

    recomputePower();

    redraw();

    if(gameWon){

        document.getElementById(
            'status'
        ).textContent =
            "Puzzle résolu !";

    }else{

        document.getElementById(
            'status'
        ).textContent = '';
    }
}

function redraw(){

    const canvases =
        document.querySelectorAll('canvas');

    let i = 0;

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            drawCell(
                canvases[i],
                board[y][x]
            );

            i++;
        }
    }
}

function drawCell(canvas, cell){

    const ctx =
        canvas.getContext('2d');

    ctx.clearRect(
        0,
        0,
        CELL,
        CELL
    );

    const c = CELL / 2;

    const edge = 2;

    // Couleur
    let color = '#111';

    if(cell.error){

        color = '#d64545';

    }else if(gameWon){

        color = '#4a7dff';

    }else if(cell.powered){

        color = '#35c96b';
    }

    // Tuyaux
    ctx.strokeStyle = color;

    ctx.lineWidth = 16;

    ctx.lineCap = 'round';

    ctx.beginPath();

    for(const dir of cell.connections){

        ctx.moveTo(c,c);

        switch(dir){

            case 'N':
                ctx.lineTo(c, edge);
                break;

            case 'E':
                ctx.lineTo(CELL-edge, c);
                break;

            case 'S':
                ctx.lineTo(c, CELL-edge);
                break;

            case 'W':
                ctx.lineTo(edge, c);
                break;
        }
    }

    ctx.stroke();

    // Cercle central
    ctx.beginPath();

    ctx.fillStyle = '#f5f2e8';

    ctx.strokeStyle = color;

    ctx.lineWidth = 5;

    ctx.arc(
        c,
        c,
        8,
        0,
        Math.PI*2
    );

    ctx.fill();
    ctx.stroke();
}

function hasConnection(cell, dir){

    return cell.connections.includes(dir);
}

function recomputePower(){

    gameWon = false;

    // reset
    for(let y=0;y<SIZE;y++){
        for(let x=0;x<SIZE;x++){

            board[y][x].powered = false;
            board[y][x].error = false;
        }
    }

    const queue = [];

    // départ = tous les cul de sacs
    for(let y=0;y<SIZE;y++){
        for(let x=0;x<SIZE;x++){

            const cell = board[y][x];

            if(cell.type === 'o'){

                cell.powered = true;

                queue.push(cell);
            }
        }
    }

    // propagation
    while(queue.length){

        const cell = queue.shift();

        for(const dir of cell.connections){

            const [dx,dy] =
                VECTORS[dir];

            const nx = cell.x + dx;
            const ny = cell.y + dy;

            // hors plateau
            if(
                nx < 0 ||
                ny < 0 ||
                nx >= SIZE ||
                ny >= SIZE
            ){
                cell.error = true;
                continue;
            }

            const other =
                board[ny][nx];

            // connexion invalide
            if(
                !hasConnection(
                    other,
                    OPPOSITE[dir]
                )
            ){

                cell.error = true;
                other.error = true;

                continue;
            }

            // propagation
            if(!other.powered){

                other.powered = true;

                queue.push(other);
            }
        }
    }

    // victoire
    gameWon = true;

    for(let y=0;y<SIZE;y++){
        for(let x=0;x<SIZE;x++){

            const cell = board[y][x];

            if(
                cell.error ||
                !cell.powered
            ){
                gameWon = false;
            }
        }
    }
}

function shuffleBoard(){

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            const rotation =
                Math.floor(Math.random()*4);

            board[y][x].rotation =
                rotation;

            board[y][x].connections =
                rotateConnections(
                    PIECES[
                        board[y][x].type
                    ],
                    rotation
                );
        }
    }

    recomputePower();

    redraw();

    document.getElementById(
        'status'
    ).textContent = '';
}

createBoard();

</script>

</body>
</html>
