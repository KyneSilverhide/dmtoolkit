version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: criticalfail
      POSTGRES_USER: criticalfail
      POSTGRES_PASSWORD: criticalfail
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  dmtoolkit-backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://criticalfail:criticalfail@postgres:5432/criticalfail
      JWT_SECRET: changeme_in_production
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads
  
  dmtoolkit-frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - dmtoolkit-backend
    environment:
      VITE_BACKEND_URL: http://localhost:3000

volumes:
  pgdata:
  uploads:
